<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Appointment App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 12px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .demo-credentials {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
            text-align: center;
        }

        .demo-credentials h3 {
            color: #333;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .credentials-list {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .credentials-list p {
            margin: 5px 0;
        }

        .credentials-password {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 11px;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
            padding: 12px;
            background: #ffebee;
            border-radius: 4px;
            border-left: 4px solid #d32f2f;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-form {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome</h1>
            <p>Java Backend Developer - Appointment Booking</p>
        </div>

        <form class="login-form" action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="login-button">Sign In</button>

            <div id="errorMessage" class="error-message"></div>
        </form>

        <div class="demo-credentials">
            <h3>📋 Demo Credentials</h3>
            <div class="credentials-list">
                <p><strong>Admin:</strong> admin / <span class="credentials-password">admin</span></p>
                <p><strong>Specialist:</strong> specialist / <span class="credentials-password">specialist</span></p>
                <p><strong>Receptionist:</strong> receptionist / <span class="credentials-password">receptionist</span></p>
                <p><strong>Client:</strong> client / <span class="credentials-password">client</span></p>
            </div>
        </div>
    </div>

    <script>
        // Handle login error parameter
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = 'Invalid username or password. Please try again.';
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
